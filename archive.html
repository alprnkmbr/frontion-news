<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — The Geopol Brief</title>
    <meta name="description" content="All geopolitical briefs, morning and evening">
    <link rel="stylesheet" href="/style.css">
    <link rel="alternate" type="application/rss+xml" title="The Geopol Brief" href="/feed.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="masthead">
                <a href="/" class="logo">The Geopol Brief</a>
                <div class="tagline">Geopolitical analysis, twice daily</div>
            </div>
            <nav class="header-nav">
                <a href="/">Latest</a>
                <a href="/feed.xml">RSS</a>
            </nav>
        </div>
        <div class="header-rule"></div>
    </header>

    <main class="site-main">
        <h2 class="section-title">Archive</h2>
        <div id="archive-list" class="briefs-grid">
            <!-- Loaded dynamically -->
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; 2026 The Geopol Brief. All rights reserved.</p>
            <p class="footer-sub">Powered by <a href="https://github.com">GitHub Pages</a>. Content generated with <a href="https://openclaw.ai">OpenClaw</a>.</p>
        </div>
    </footer>

    <script>
        async function loadBriefs() {
            try {
                const resp = await fetch('/briefs/index.json');
                return await resp.json();
            } catch(e) { return []; }
        }

        function formatDateShort(d) {
            return new Date(d).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
        }

        async function render() {
            const briefs = await loadBriefs();
            const container = document.getElementById('archive-list');
            if (briefs.length === 0) {
                container.innerHTML = '<p>No briefs yet.</p>';
                return;
            }
            container.innerHTML = briefs.map(b => {
                const tagLabel = b.type === 'morning' ? '☀️ Morning' : '🌙 Evening';
                const excerpt = b.stories && b.stories.length > 0 ? b.stories[0].headline : '';
                return `
                    <div class="brief-card">
                        <div class="brief-card-date">${formatDateShort(b.date)} · ${tagLabel}</div>
                        <div class="brief-card-title"><a href="/brief.html?b=${b.slug}">${b.title}</a></div>
                        <div class="brief-card-excerpt">${excerpt}</div>
                    </div>
                `;
            }).join('');
        }
        render();
    </script>
</body>
</html>
