<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Energy Brief — Frontion News</title>
    <meta name="description" content="Global strategic analysis of the events reshaping the world.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Frontion">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192">
    <link rel="icon" type="image/png" href="/icon-512.png" sizes="512x512">
    <link rel="alternate" type="application/rss+xml" title="Frontion News" href="feed.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
<script>
(function(){
  var dark=false;
  try{dark=localStorage.getItem('darkMode')==='1'}catch(e){try{dark=document.cookie.indexOf('darkMode=1')!==-1}catch(e2){}}
  if(!dark&&typeof matchMedia==='function'){try{dark=matchMedia('(prefers-color-scheme:dark)').matches}catch(e){}}
  if(dark)document.documentElement.classList.add('dark-mode');
})()
</script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">Frontion News</a>
            <div class="tagline">
                <span class="tagline-line tagline-desktop">STRATEGIC ANALYSIS OF THE LATEST</span>
                <span class="tagline-line tagline-desktop">EVENTS RESHAPING THE WORLD</span>
                <span class="tagline-line tagline-mobile1">STRATEGIC ANALYSIS</span>
                <span class="tagline-line tagline-mobile2">OF THE LATEST EVENTS</span>
                <span class="tagline-line tagline-mobile2">RESHAPING THE WORLD</span>
            </div>
        </div>
        <div class="header-rule"></div>
    </header>

    <main class="site-main">
        <div class="headlines-meta" id="headlinesMeta" style="display:none">
            <span id="headlinesDate"></span><span class="meta-divider">·</span><span id="localTime"></span><span class="meta-divider">·</span><span id="localWeather"></span>
        </div>
        <div class="date-timeline">
            <button class="timeline-arrow" id="prevBtn" onclick="shiftTimeline(-1)">←</button>
            <div class="timeline-dates" id="timelineDates"></div>
            <button class="timeline-arrow" id="nextBtn" onclick="shiftTimeline(1)">→</button>
        </div>
        <div id="analysisContent">
            <p style="text-align:center;color:var(--color-muted);padding:3rem 0">Loading Energy Brief…</p>
        </div>
    </main>

    <div class="subscribe-section">
        <div class="subscribe-inner">
            <div class="subscribe-text">Stay ahead with weekly analysis</div>
            <a href="/subscribe" class="subscribe-link">Subscribe to the briefing</a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; 2026 Frontion News. All rights reserved.</p>
        </div>
    </footer>

    <div class="read-settings-toggle" id="readSettingsToggle" onclick="toggleReadSettings()" title="Reading settings">⚙</div>
    <div class="read-settings-panel" id="readSettingsPanel">
        <label>Text Size <span class="read-settings-value" id="fontSizeValue">100%</span></label>
        <input type="range" id="fontSizeSlider" min="70" max="140" value="100" step="5" oninput="updateReadSettings()">
        <label>Content Width <span class="read-settings-value" id="contentWidthValue">Default</span></label>
        <input type="range" id="contentWidthSlider" min="0" max="8" value="4" step="1" oninput="updateReadSettings()">
        <label>Alignment</label>
        <div class="read-settings-group">
            <button class="read-settings-btn active" id="justifyLeft" onclick="setJustify('left')">Left</button>
            <button class="read-settings-btn" id="justifyJustify" onclick="setJustify('justify')">Justify</button>
        </div>
    </div>
    <div class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">
        <span id="darkIcon">☽</span>
    </div>

<script>
// ============ CATEGORY BRIEF PAGE ============
var BRIEF_DIR = '/energy/';
var CATEGORY_TITLE = 'Energy Brief';
var CATEGORY_NAME = 'Energy';

let analysisBriefs = [];
const DATES_VISIBLE = 7;
let currentIndex = 0;
let viewOffset = 0;

function formatDateShort(iso) {
    const clean = iso.replace(/[a-z]+$/, '');
    const d = new Date(clean + 'T00:00:00');
    if (isNaN(d.getTime())) return iso;
    const base = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const suffix = iso.match(/[a-z]+$/);
    return suffix ? base + '²' : base;
}

function formatFullDate(dateStr) {
    const d = new Date(dateStr.replace(/[a-z]+$/, '') + 'T00:00:00');
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function renderTimeline() {
    const container = document.getElementById('timelineDates');
    const start = viewOffset;
    const end = Math.min(start + DATES_VISIBLE, analysisBriefs.length);
    let html = '';
    for (let i = start; i < end; i++) {
        const b = analysisBriefs[i];
        const active = i === currentIndex ? ' active' : '';
        html += `<a href="#" class="timeline-date${active}" onclick="selectDate(${i}); return false;" title="${b.title}">${formatDateShort(b.date)}</a>`;
        if (i < end - 1) html += '<div class="timeline-divider"></div>';
    }
    container.innerHTML = html;
    document.getElementById('prevBtn').disabled = viewOffset <= 0;
    document.getElementById('nextBtn').disabled = end >= analysisBriefs.length;
}

function shiftTimeline(dir) {
    const newOffset = viewOffset + dir;
    if (newOffset < 0 || newOffset + DATES_VISIBLE > analysisBriefs.length) return;
    viewOffset = newOffset;
    renderTimeline();
}

function selectDate(index) {
    currentIndex = index;
    renderTimeline();
    loadBriefContent(analysisBriefs[index].date);
}

function loadBriefContent(dateSlug) {
    const container = document.getElementById('analysisContent');
    container.innerHTML = '<p style="text-align:center;color:var(--color-muted);padding:3rem 0">Loading…</p>';

    fetch(BRIEF_DIR + dateSlug + '.json?v=' + Date.now())
      .then(r => r.json())
      .then(brief => {
        const dateObj = new Date(brief.date.replace(/[a-z]+$/, '') + 'T00:00:00');
        const dateStr = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

        let html = `
          <h1 class="brief-headline">${brief.title}</h1>
          <div class="brief-subhead">${brief.subhead}</div>
          <div class="brief-meta">
              <time datetime="${brief.date}">${dateStr}</time> · Frontion News ${CATEGORY_NAME} Analysis
          </div>`;

        brief.sections.forEach((sec, i) => {
          if (i > 0) html += '<hr class="section-divider">';
          html += `
          <div class="analysis-section">
              <h2 class="section-heading">${sec.heading}</h2>
              <div class="section-body">${sec.body}</div>
              <div class="why-it-matters">
                  <strong>Why it matters</strong> &mdash; ${sec.whyItMatters}
              </div>
          </div>`;
        });

        if (brief.bottomLine) {
          html += `
          <div class="bottom-line">
              <div class="bottom-line-kicker">Bottom Line</div>
              <div class="bottom-line-body">
                  <p>${brief.bottomLine}</p>
              </div>
          </div>`;
        }

        requestAnimationFrame(function() {
            container.innerHTML = html;
            requestAnimationFrame(function() {
                window.scrollTo({ top: 0, behavior: 'instant' });
            });
        });
        document.title = brief.title + ' — Frontion News';
      })
      .catch(err => {
        container.innerHTML = '<p style="text-align:center;color:var(--color-muted);padding:3rem 0">Unable to load analysis for this date.</p>';
      });
}

// Load index
fetch(BRIEF_DIR + 'index.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    analysisBriefs = data;
    if (analysisBriefs.length > 0) {
      currentIndex = 0;
      renderTimeline();
      loadBriefContent(analysisBriefs[0].date);
    } else {
      document.getElementById('analysisContent').innerHTML = '<p style="text-align:center;color:var(--color-muted);padding:3rem 0">No analysis available yet.</p>';
    }
  })
  .catch(err => {
    document.getElementById('analysisContent').innerHTML = '<p style="text-align:center;color:var(--color-muted);padding:3rem 0">Unable to load analysis index.</p>';
  });

// Dark mode
function toggleDark() {
    document.documentElement.classList.toggle('dark-mode');
    var dark = document.documentElement.classList.contains('dark-mode');
    try { localStorage.setItem('darkMode', dark ? '1' : '0'); } catch(e) { document.cookie = 'darkMode=' + (dark ? '1' : '0') + ';path=/;max-age=31536000'; }
    var icon = document.getElementById('darkIcon');
    if (icon) icon.textContent = dark ? '☀' : '☽';
}

// Read settings
function updateReadSettings() {
    var size = document.getElementById('fontSizeSlider').value;
    var width = document.getElementById('contentWidthSlider').value;
    document.getElementById('fontSizeValue').textContent = size + '%';
    var widthLabels = ['XS','S','S-','M-','Default','M+','L-','L','XL'];
    document.getElementById('contentWidthValue').textContent = widthLabels[width] || 'Default';
    var main = document.querySelector('.site-main');
    if (main) {
        main.style.fontSize = size + '%';
        var maxW = [540,600,640,680,720,760,800,840,880];
        main.style.maxWidth = (maxW[width] || 720) + 'px';
    }
    try { localStorage.setItem('fn_readSize', size); localStorage.setItem('fn_readWidth', width); } catch(e) {}
}

function setJustify(align) {
    var main = document.querySelector('.site-main');
    if (main) main.style.textAlign = align;
    document.getElementById('justifyLeft').classList.toggle('active', align === 'left');
    document.getElementById('justifyJustify').classList.toggle('active', align === 'justify');
    try { localStorage.setItem('fn_readJustify', align); } catch(e) {}
}

function toggleReadSettings() {
    document.getElementById('readSettingsPanel').classList.toggle('open');
}

// Restore read settings
(function() {
    try {
        var s = localStorage.getItem('fn_readSize');
        var w = localStorage.getItem('fn_readWidth');
        var j = localStorage.getItem('fn_readJustify');
        if (s) { document.getElementById('fontSizeSlider').value = s; updateReadSettings(); }
        if (w) { document.getElementById('contentWidthSlider').value = w; updateReadSettings(); }
        if (j) setJustify(j);
    } catch(e) {}
})();

// Local time
function updateLocalTime() {
    var now = new Date();
    var el = document.getElementById('localTime');
    if (el) el.textContent = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: true });
}
updateLocalTime();
setInterval(updateLocalTime, 30000);

// Weather
var weatherIcons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'🌧️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};

function fetchWeather() {
    try {
        var cached = localStorage.getItem('fn_coords');
        if (cached) {
            var c = JSON.parse(cached);
            fetchWeatherByCoords(c.lat, c.lon);
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
                }, function() {}, { timeout: 8000 });
            }
            return;
        }
    } catch(e) {}
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
        }, function() { fetchWeatherByIP(); }, { timeout: 5000 });
    } else {
        fetchWeatherByIP();
    }
}

function fetchWeatherByCoords(lat, lon) {
    fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current_weather=true')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data && data.current_weather) {
                var w = data.current_weather;
                var temp = Math.round(w.temperature);
                var icon = weatherIcons[w.weathercode] || '🌡️';
                var el = document.getElementById('localWeather');
                if (el) el.textContent = icon + ' ' + temp + '°C';
                try { localStorage.setItem('fn_coords', JSON.stringify({lat:lat, lon:lon})); } catch(e) {}
            }
        })
        .catch(function() { var el = document.getElementById('localWeather'); if (el) el.textContent = ''; });
}

function fetchWeatherByIP() {
    fetch('https://ipapi.co/json/')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.latitude && data.longitude) {
                fetchWeatherByCoords(data.latitude, data.longitude);
            }
        })
        .catch(function() { var el = document.getElementById('localWeather'); if (el) el.textContent = ''; });
}

// Show meta bar and fetch weather
var meta = document.getElementById('headlinesMeta');
if (meta) {
    meta.style.display = 'flex';
    var dateEl = document.getElementById('headlinesDate');
    if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    fetchWeather();
}
</script>
</body>
</html>
